<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Won!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            text-align: center;
        }
        
        .win-message {
            font-size: 4rem;
            color: gold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: bounce 0.5s infinite alternate;
            display: none;
        }
        
        .play-button {
            padding: 20px 40px;
            font-size: 1.5rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .play-button:hover {
            transform: scale(1.1);
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        
        .trophy {
            font-size: 5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="trophy">😭</div>
        <div class="win-message">You actually fell for it LOL</div>
        <button class="play-button" onclick="win()">Get trolled</button>
    </div>

    <script>
        function win() {
            document.querySelector('.play-button').style.display = 'none';
            document.querySelector('.win-message').style.display = 'block';
            document.querySelector('.trophy').style.display = 'block';
            
            // Party time!
            for (let i = 0; i < 50; i++) {
                createConfetti();
            }
        }
        
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.width = '10px';
            confetti.style.height = '10px';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.transition = `all ${Math.random() * 2 + 1}s linear`;
            confetti.style.zIndex = '1000';
            
            document.body.appendChild(confetti);
            
            setTimeout(() => {
                confetti.style.top = '100vh';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            }, 10);
            
            setTimeout(() => {
                confetti.remove();
            }, 3000);
        }
    </script>
</body>
</html>
